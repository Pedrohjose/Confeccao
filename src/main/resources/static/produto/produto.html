<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos - Sistema de Confecção</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
	<div id="header-container"></div>
	<script src="/header.js"></script>

	<h1>Gestão de Produtos - Confecção</h1>

	<div class="card">
		<h2>Novo Produto</h2>
		<div class="form-group">
			<label>Nome:</label> <input type="text" id="nome"
				placeholder="Ex: Camiseta Básica">
		</div>
		<div class="form-group">
			<label>Descrição:</label> <input type="text" id="descricao"
				placeholder="Ex: 100% Algodão Gola V">
		</div>
		<div class="form-group">
			<label>Preço (R$):</label> <input type="number" step="0.01"
				id="preco" placeholder="49.90">
		</div>
		<div class="form-group">
			<label>Estoque (Qtd):</label> <input type="number" id="estoque"
				placeholder="100">
		</div>
		<button class="btn btn-save" onclick="salvarProduto()">Salvar
			Produto</button>
	</div>

	<div class="card">
		<h2>Produtos Cadastrados</h2>
		<button class="btn btn-refresh" onclick="listarProdutos()">Atualizar
			Lista</button>
		<table id="tabelaProdutos">
			<thead>
				<tr>
					<th>ID</th>
					<th>Nome</th>
					<th>Descrição</th>
					<th>Preço</th>
					<th>Estoque</th>
					<th>Ações</th>
				</tr>
			</thead>
			<tbody>
			</tbody>
		</table>
	</div>

	<div id="modalEdicao" class="modal">
		<div class="modal-content">
			<h2>Edição de Produto</h2>
			<hr>
			<input type="hidden" id="editId">

			<div class="form-group">
				<label>Nome:</label> <input type="text" id="editNome">
			</div>
			<div class="form-group">
				<label>Descrição:</label> <input type="text" id="editDescricao">
			</div>
			<div class="form-group">
				<label>Preço (R$):</label> <input type="number" step="0.01"
					id="editPreco">
			</div>
			<div class="form-group">
				<label>Estoque (Qtd):</label> <input type="number" id="editEstoque">
			</div>

			<div style="display: flex; gap: 10px; margin-top: 20px;">
				<button class="btn btn-save" onclick="salvarEdicao()">Salvar
					Alterações</button>
				<button class="btn" style="background: #6c757d; color: white;"
					onclick="fecharModal()">Cancelar</button>
			</div>
		</div>
	</div>
	<div id="footer-container"></div>
	<script src="../footer.js"></script>
	<script src="produto.js"></script>
</body>
</html>
