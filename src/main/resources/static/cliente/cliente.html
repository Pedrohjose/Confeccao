<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Confecção</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
	<div id="header-container"></div>

	<script src="../header.js"></script>

	<h1>Gestão de Clientes - Confecção</h1>

	<div class="card">
		<h2>Novo Cliente</h2>
		<div class="form-group">
			<label>Nome:</label> <input type="text" id="nome"
				placeholder="Ex: Maria Rendeira">
		</div>
		<div class="form-group">
			<label for="cpfCnpj">CPF / CNPJ:</label> <input type="text"
				id="cpfCnpj" placeholder="Digite apenas números"
				oninput="mascararCpfCnpj(this)">
		</div>
		<div class="form-group">
			<label>Telefone:</label><input type="text" id="telefone"
				placeholder="(99) 99999-9999" oninput="mascararTelefone(this)">
		</div>
		<button class="btn btn-save" onclick="salvarCliente()">Salvar
			Cliente</button>
	</div>

	<div class="card">
		<h2>Clientes Cadastrados</h2>
		<button class="btn btn-refresh" onclick="listarClientes()">
			Atualizar Lista</button>
		<table id="tabelaClientes">
			<thead>
				<tr>
					<th>ID</th>
					<th>Nome</th>
					<th>CPF/CNPJ</th>
					<th>Telefone</th>
					<th>Ações</th>
				</tr>
			</thead>
			<tbody>
			</tbody>
		</table>
	</div>

	<div id="modalEdicao" class="modal">
		<div class="modal-content">
			<h2>Edição de Cliente</h2>
			<hr>
			<input type="hidden" id="editId">

			<div class="form-group">
				<label>Nome:</label> <input type="text" id="editNome">
			</div>
			<div class="form-group">
				<label>CPF/CNPJ:</label> <input type="text" id="editCpf">
			</div>
			<div class="form-group">
				<label>Telefone:</label> <input type="text" id="editTelefone">
			</div>

			<div style="display: flex; gap: 10px; margin-top: 20px;">
				<button class="btn btn-save" onclick="salvarEdicao()">Salvar
					Alterações</button>
				<button class="btn" style="background: #6c757d; color: white;"
					onclick="fecharModal()">Cancelar</button>
			</div>
		</div>
	</div>
	<div id="footer-container"></div>
	<script src="../footer.js"></script>
	<script src="cliente.js"></script>
</body>
</html>
