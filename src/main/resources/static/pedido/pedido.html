<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos - Confecção</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
	<div id="header-container"></div>
	<script src="/header.js"></script>

	<h1>Gestão de Pedidos</h1>

	<div class="card">
		<h2>Novo Pedido</h2>

		<div style="display: flex; gap: 15px; margin-bottom: 20px;">
			<div class="form-group" style="flex: 1;">
				<label>Cliente:</label> <select id="clienteId">
					<option value="">Selecione um Cliente...</option>
				</select>
			</div>
			<div class="form-group" style="flex: 1;">
				<label>Forma de Pagamento:</label> <select id="formaPagamentoId">
					<option value="">Selecione o Pagamento...</option>
				</select>
			</div>
		</div>

		<hr style="margin: 20px 0;">

		<h3>Adicionar Produtos</h3>
		<div
			style="display: flex; gap: 15px; align-items: end; margin-bottom: 15px;">
			<div class="form-group" style="flex: 2;">
				<label>Produto:</label> <select id="produtoId">
					<option value="">Selecione um Produto...</option>
				</select>
			</div>
			<div class="form-group" style="flex: 1;">
				<label>Quantidade:</label> <input type="number" id="quantidade"
					value="1" min="1">
			</div>
			<button class="btn"
				style="background: #17a2b8; color: white; margin-bottom: 15px;"
				onclick="adicionarAoCarrinho()">+ Add ao Carrinho</button>
		</div>

		<table id="tabelaCarrinho">
			<thead>
				<tr>
					<th>Produto</th>
					<th>Qtd</th>
					<th>Preço Un.</th>
					<th>Subtotal</th>
					<th>Ação</th>
				</tr>
			</thead>
			<tbody>
			</tbody>
		</table>

		<h3 style="text-align: right; color: #d63384; margin-top: 15px;">
			Total do Pedido: R$ <span id="valorTotalPedido">0.00</span>
		</h3>

		<button class="btn btn-save"
			style="width: 100%; font-size: 18px; margin-top: 10px;"
			onclick="finalizarPedido()">Finalizar e Salvar Pedido</button>
	</div>

	<div class="card">
		<h2>Pedidos Realizados</h2>
		<button class="btn btn-refresh" onclick="listarPedidos()">Atualizar
			Lista</button>
		<table id="tabelaPedidos">
			<thead>
				<tr>
					<th>Nº Pedido</th>
					<th>Data</th>
					<th>Cliente</th>
					<th>Pagamento</th>
					<th>Valor Total</th>
					<th>Itens</th>
				</tr>
			</thead>
			<tbody>
			</tbody>
		</table>
	</div>

	<div id="modalDetalhes" class="modal">
		<div class="modal-content" style="width: 500px;">
			<h2 style="margin-top: 0; color: #1a73e8;">
				Itens do Pedido <span id="detalhesIdPedido"></span>
			</h2>
			<hr style="margin-bottom: 15px;">

			<table id="tabelaItensPedido">
				<thead>
					<tr>
						<th>Produto</th>
						<th>Qtd</th>
						<th>Preço Un.</th>
						<th>Subtotal</th>
					</tr>
				</thead>
				<tbody>
				</tbody>
			</table>

			<div
				style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;">
				<button class="btn" style="background: #6c757d; color: white;"
					onclick="fecharModalDetalhes()">Fechar</button>
			</div>
		</div>
	</div>
	<div id="footer-container"></div>
	<script src="../footer.js"></script>
	<script src="pedido.js"></script>
</body>
</html>
